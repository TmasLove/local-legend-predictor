services:
  - type: web
    name: local-legend-predictor
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_CALLBACK_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
